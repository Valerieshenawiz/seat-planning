<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>婚禮座位管理系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay hidden"></div>

<!-- Guest Modal -->
<div id="guest-modal" class="modal hidden">
  <div class="modal-header">
    <h3 id="guest-modal-title">新增賓客</h3>
    <button class="btn-icon" onclick="closeModal('guest-modal')">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>姓名 *</label>
      <input type="text" id="g-name" placeholder="例：王小明" />
    </div>
    <div class="form-group">
      <label>賓客屬性</label>
      <input type="text" id="g-group" placeholder="例：高中同學、公司同事、親戚…" list="group-suggestions" />
      <datalist id="group-suggestions"></datalist>
    </div>
    <div class="form-group">
      <label>人數</label>
      <div class="number-input">
        <button type="button" onclick="adjustNum(-1)">−</button>
        <input type="number" id="g-count" value="1" min="1" max="20" />
        <button type="button" onclick="adjustNum(1)">＋</button>
      </div>
    </div>
    <div class="form-group">
      <label>代表色</label>
      <div class="color-picker-row">
        <div id="color-swatches" class="color-swatches"></div>
        <input type="color" id="g-color" value="#6366f1" />
      </div>
    </div>
    <div class="form-group">
      <label>備註</label>
      <input type="text" id="g-note" placeholder="選填" />
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-secondary" onclick="closeModal('guest-modal')">取消</button>
    <button class="btn-primary" onclick="saveGuest()">儲存</button>
  </div>
</div>

<!-- Table Modal -->
<div id="table-modal" class="modal hidden">
  <div class="modal-header">
    <h3 id="table-modal-title">編輯桌次</h3>
    <button class="btn-icon" onclick="closeModal('table-modal')">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>桌名</label>
      <input type="text" id="t-name" placeholder="例：第一桌、主桌…" />
    </div>
    <div class="form-group">
      <label>座位上限</label>
      <div class="number-input">
        <button type="button" onclick="adjustTableCap(-1)">−</button>
        <input type="number" id="t-cap" value="10" min="1" max="30" />
        <button type="button" onclick="adjustTableCap(1)">＋</button>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-secondary" onclick="closeModal('table-modal')">取消</button>
    <button class="btn-primary" onclick="saveTable()">儲存</button>
  </div>
</div>

<!-- Import Modal -->
<div id="import-modal" class="modal hidden">
  <div class="modal-header">
    <h3>匯入 Excel</h3>
    <button class="btn-icon" onclick="closeModal('import-modal')">✕</button>
  </div>
  <div class="modal-body">
    <p class="hint-text">Excel 欄位格式（第一列為標題）：<br>
      <strong>姓名 | 屬性 | 人數 | 備註</strong>
    </p>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-zone-inner">
        <span class="drop-icon">📄</span>
        <p>點擊或拖曳 Excel 檔案至此</p>
        <p class="hint-text">.xlsx / .xls / .csv</p>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileImport(event)" />
    </div>
    <div id="import-preview" class="import-preview hidden"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-secondary" onclick="closeModal('import-modal')">取消</button>
    <button class="btn-primary" id="confirm-import-btn" onclick="confirmImport()" disabled>確認匯入</button>
  </div>
</div>

<!-- Confirm Dialog -->
<div id="confirm-modal" class="modal modal-sm hidden">
  <div class="modal-header">
    <h3 id="confirm-title">確認</h3>
    <button class="btn-icon" onclick="closeModal('confirm-modal')">✕</button>
  </div>
  <div class="modal-body">
    <p id="confirm-message"></p>
  </div>
  <div class="modal-footer">
    <button class="btn-secondary" onclick="closeModal('confirm-modal')">取消</button>
    <button class="btn-danger" id="confirm-ok-btn">確認</button>
  </div>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<!-- MAIN APP -->
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">💍</div>
      <div>
        <div class="app-title">婚禮座位</div>
        <div class="app-subtitle">管理系統</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">總人數</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-green" id="stat-seated">0</div>
        <div class="stat-label">已安排</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-amber" id="stat-unassigned">0</div>
        <div class="stat-label">未安排</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-tables">25</div>
        <div class="stat-label">桌數</div>
      </div>
    </div>

    <!-- Undo/Redo -->
    <div class="undo-bar">
      <button class="btn-undo" id="btn-undo" onclick="undo()" disabled title="復原 (Ctrl+Z)">
        ↩ 復原
      </button>
      <button class="btn-undo" id="btn-redo" onclick="redo()" disabled title="重做 (Ctrl+Y)">
        重做 ↪
      </button>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="seating" onclick="switchView('seating')">
        <span>🪑</span> 座位安排
      </button>
      <button class="nav-item" data-view="guests" onclick="switchView('guests')">
        <span>👥</span> 賓客管理
      </button>
      <button class="nav-item" data-view="tables" onclick="switchView('tables')">
        <span>🍽</span> 桌次管理
      </button>
    </nav>

    <!-- Actions -->
    <div class="sidebar-actions">
      <button class="btn-action" onclick="openImportModal()">📥 匯入 Excel</button>
      <button class="btn-action" onclick="exportExcel()">📤 匯出 Excel</button>
      <button class="btn-action btn-action-danger" onclick="confirmClearAll()">🗑 清空所有資料</button>
    </div>

    <div class="sidebar-footer">
      <span id="save-indicator">● 已自動儲存</span>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="main">

    <!-- ===== SEATING VIEW ===== -->
    <div id="view-seating" class="view active">
      <div class="view-header">
        <div>
          <h1>座位安排</h1>
          <p class="view-subtitle">將左側賓客拖曳至右側桌次，或點擊賓客卡片選取後點擊桌次指派</p>
        </div>
        <div class="view-actions">
          <button class="btn-secondary" onclick="autoAssign()">⚡ 自動分配未安排</button>
          <button class="btn-secondary" onclick="clearAllAssignments()">↺ 清除所有安排</button>
        </div>
      </div>

      <div class="seating-layout">
        <!-- Unassigned Panel -->
        <div class="unassigned-panel">
          <div class="panel-header">
            <h3>未安排賓客 <span id="unassigned-badge" class="badge">0</span></h3>
            <input type="text" id="unassigned-search" placeholder="搜尋…" oninput="renderUnassigned()" />
          </div>
          <div id="unassigned-list" class="unassigned-list"></div>
        </div>

        <!-- Tables Grid -->
        <div class="tables-area">
          <div id="tables-grid" class="tables-grid"></div>
        </div>
      </div>
    </div>

    <!-- ===== GUESTS VIEW ===== -->
    <div id="view-guests" class="view">
      <div class="view-header">
        <div>
          <h1>賓客管理</h1>
          <p class="view-subtitle">管理所有賓客資料</p>
        </div>
        <div class="view-actions">
          <input type="text" id="guest-search" class="search-input" placeholder="搜尋姓名或屬性…" oninput="renderGuestList()" />
          <button class="btn-primary" onclick="openAddGuest()">＋ 新增賓客</button>
        </div>
      </div>

      <div class="guest-toolbar">
        <label class="checkbox-label">
          <input type="checkbox" id="select-all-checkbox" onchange="toggleSelectAll()" />
          全選
        </label>
        <button class="btn-ghost" id="batch-delete-btn" onclick="batchDelete()" disabled>🗑 刪除選取</button>
        <button class="btn-ghost" onclick="openImportModal()">📥 匯入</button>
        <button class="btn-ghost" onclick="exportExcel()">📤 匯出</button>
      </div>

      <div id="guest-list" class="guest-list"></div>
    </div>

    <!-- ===== TABLES VIEW ===== -->
    <div id="view-tables" class="view">
      <div class="view-header">
        <div>
          <h1>桌次管理</h1>
          <p class="view-subtitle">新增、編輯或刪除桌次</p>
        </div>
        <div class="view-actions">
          <button class="btn-primary" onclick="addTable()">＋ 新增桌次</button>
        </div>
      </div>
      <div id="table-list" class="table-list"></div>
    </div>

  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
