<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮座位管理系統</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">💍 <span>婚禮座位</span></div>
      <nav class="tabs">
        <button class="tab active" data-tab="seating">座位安排</button>
        <button class="tab" data-tab="guests">賓客管理</button>
        <button class="tab" data-tab="tables">桌次管理</button>
        <button class="tab" data-tab="stats">統計</button>
      </nav>
    </div>
    <div class="topbar-right">
      <span class="mini-stat">總 <b id="mini-total">0</b></span>
      <span class="mini-stat ok">已安排 <b id="mini-assigned">0</b></span>
      <span class="mini-stat warn">未安排 <b id="mini-unassigned">0</b></span>
      <button class="icon-btn" id="btn-undo" title="復原 Ctrl+Z" disabled>↩</button>
      <button class="icon-btn" id="btn-redo" title="重做 Ctrl+Y" disabled>↪</button>
      <button class="pill-btn" id="btn-import">↑ 匯入</button>
      <button class="pill-btn" id="btn-export">↓ 匯出</button>
      <button class="pill-btn danger" id="btn-clear-all">🗑 清除全部</button>
      <span class="save-dot" id="save-dot" title="已儲存"></span>
    </div>
  </header>

  <!-- TAB: SEATING -->
  <div id="tab-seating" class="tab-pane active">
    <aside class="left-panel">
      <div class="lp-header">
        <span>未安排賓客</span>
        <span class="badge" id="unassigned-badge">0</span>
      </div>
      <div class="lp-search">
        <input type="text" id="search-unassigned" placeholder="🔍 搜尋賓客...">
      </div>
      <div class="lp-filters" id="group-filters"></div>
      <div class="guest-pool" id="guest-pool"></div>
    </aside>
    <main class="right-panel">
      <div class="rp-toolbar">
        <span class="rp-hint">拖曳賓客至圓桌 · 點擊小圓圈可移除</span>
        <button class="pill-btn sm" id="btn-add-table-s">＋ 新增桌</button>
      </div>
      <div class="tables-canvas" id="tables-canvas"></div>
    </main>
  </div>

  <!-- TAB: GUESTS -->
  <div id="tab-guests" class="tab-pane">
    <div class="page-wrap">
      <div class="page-header">
        <div><h1>賓客管理</h1><p>管理所有賓客資訊</p></div>
        <div class="row-gap">
          <button class="pill-btn" id="btn-batch">批次修改</button>
          <button class="pill-btn accent" id="btn-add-guest">＋ 新增賓客</button>
        </div>
      </div>
      <div class="table-toolbar">
        <input type="text" class="search-input" id="search-guests" placeholder="🔍 搜尋...">
        <select id="filter-group" class="sel"></select>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="guest-table">
          <thead><tr>
            <th><input type="checkbox" id="sel-all"></th>
            <th>姓名</th><th>群組</th><th>人數</th><th>顏色</th><th>座位</th><th>操作</th>
          </tr></thead>
          <tbody id="guest-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- TAB: TABLES -->
  <div id="tab-tables" class="tab-pane">
    <div class="page-wrap">
      <div class="page-header">
        <div><h1>桌次管理</h1><p>管理桌次設定</p></div>
        <div class="row-gap">
          <button class="pill-btn" id="btn-reset-tables">重設25桌</button>
          <button class="pill-btn accent" id="btn-add-table">＋ 新增桌次</button>
        </div>
      </div>
      <div class="mgmt-grid" id="tables-mgmt"></div>
    </div>
  </div>

  <!-- TAB: STATS -->
  <div id="tab-stats" class="tab-pane">
    <div class="page-wrap">
      <div class="page-header"><h1>統計總覽</h1></div>
      <div class="stat-cards">
        <div class="stat-card c1"><div class="sl">總人數</div><div class="sv" id="s-total">0</div></div>
        <div class="stat-card c2"><div class="sl">已安排</div><div class="sv" id="s-assigned">0</div></div>
        <div class="stat-card c3"><div class="sl">未安排</div><div class="sv" id="s-unassigned">0</div></div>
        <div class="stat-card c4"><div class="sl">總桌數</div><div class="sv" id="s-tables">0</div></div>
      </div>
      <h2 class="section-title">各桌狀態</h2>
      <div class="table-status-wrap" id="table-status"></div>
      <h2 class="section-title">群組分佈</h2>
      <div class="group-dist" id="group-dist"></div>
    </div>
  </div>
</div>

<!-- MODALS OVERLAY -->
<div id="overlay" class="overlay hidden" onclick="handleOverlayClick(event)">

  <!-- Guest Modal -->
  <div id="modal-guest" class="modal hidden">
    <div class="modal-hd"><span id="mg-title">新增賓客</span><button onclick="closeModal('guest')" class="x-btn">✕</button></div>
    <div class="modal-bd">
      <div class="fg"><label>姓名 *</label><input id="g-name" class="fi" placeholder="賓客姓名"></div>
      <div class="fg"><label>群組</label><input id="g-group" class="fi" placeholder="高中同學、親戚..." list="grp-dl"><datalist id="grp-dl"></datalist></div>
      <div class="fg"><label>人數</label>
        <div class="num-row">
          <button class="nb" id="g-dec">−</button>
          <input id="g-count" class="fi nc" type="number" value="1" min="1">
          <button class="nb" id="g-inc">＋</button>
        </div>
      </div>
      <div class="fg"><label>代表色</label>
        <div class="cp-row">
          <div id="cp-swatches" class="swatches"></div>
          <input type="color" id="g-color" class="color-wheel" value="#6366f1">
        </div>
      </div>
      <div class="fg"><label>備註</label><input id="g-note" class="fi" placeholder="選填"></div>
    </div>
    <div class="modal-ft">
      <button onclick="closeModal('guest')" class="pill-btn">取消</button>
      <button id="btn-save-guest" class="pill-btn accent">儲存</button>
    </div>
  </div>

  <!-- Table Modal -->
  <div id="modal-table" class="modal hidden">
    <div class="modal-hd"><span id="mt-title">桌次設定</span><button onclick="closeModal('table')" class="x-btn">✕</button></div>
    <div class="modal-bd">
      <div class="fg"><label>桌名</label><input id="t-name" class="fi" placeholder="第1桌"></div>
      <div class="fg"><label>容量（人）</label>
        <div class="num-row">
          <button class="nb" id="t-dec">−</button>
          <input id="t-cap" class="fi nc" type="number" value="10" min="1">
          <button class="nb" id="t-inc">＋</button>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button onclick="closeModal('table')" class="pill-btn">取消</button>
      <button id="btn-save-table" class="pill-btn accent">儲存</button>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="modal-confirm" class="modal hidden">
    <div class="modal-hd"><span id="conf-title">確認</span></div>
    <div class="modal-bd"><p id="conf-msg" style="line-height:1.6"></p></div>
    <div class="modal-ft">
      <button id="conf-cancel" class="pill-btn">取消</button>
      <button id="conf-ok" class="pill-btn danger">確認</button>
    </div>
  </div>

  <!-- Batch Modal -->
  <div id="modal-batch" class="modal hidden">
    <div class="modal-hd"><span>批次修改</span><button onclick="closeModal('batch')" class="x-btn">✕</button></div>
    <div class="modal-bd">
      <p style="color:#888;font-size:13px">已選 <b id="batch-n">0</b> 位賓客</p>
      <div class="fg"><label>群組</label><input id="b-group" class="fi" placeholder="新群組名稱" list="grp-dl"></div>
      <div class="fg"><label>代表色</label>
        <div class="cp-row"><div id="bp-swatches" class="swatches"></div><input type="color" id="b-color" class="color-wheel" value="#6366f1"></div>
      </div>
    </div>
    <div class="modal-ft">
      <button onclick="closeModal('batch')" class="pill-btn">取消</button>
      <button id="btn-save-batch" class="pill-btn accent">套用</button>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="modal-import" class="modal hidden">
    <div class="modal-hd"><span>匯入 Excel</span><button onclick="closeModal('import')" class="x-btn">✕</button></div>
    <div class="modal-bd">
      <div class="drop-zone" id="drop-zone">
        <div style="font-size:32px">📊</div>
        <p>拖曳 Excel 至此或點擊選擇</p>
        <p style="font-size:12px;color:#aaa">支援 .xlsx .xls</p>
        <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
        <button class="pill-btn" id="btn-pick">選擇檔案</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:12px;color:#aaa">
        <span>格式：姓名 | 群組 | 人數 | 代表色</span>
        <button class="pill-btn sm" id="btn-tmpl">下載範本</button>
      </div>
      <div id="import-preview" class="hidden">
        <p style="font-size:13px;margin-bottom:8px">預覽：將匯入 <b id="import-n">0</b> 筆</p>
        <div id="import-warns"></div>
        <div class="preview-list" id="preview-list"></div>
      </div>
    </div>
    <div class="modal-ft">
      <button onclick="closeModal('import')" class="pill-btn">取消</button>
      <button id="btn-do-import" class="pill-btn accent" disabled>匯入</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
